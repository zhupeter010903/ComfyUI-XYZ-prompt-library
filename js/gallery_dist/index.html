<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>XYZ Image Gallery</title>
  <style>
    :root {
      --bg: #1a1a1a; --panel: #252525; --fg: #e0e0e0;
      --muted: #8a8a8a; --accent: #4a9eff; --error: #ff6b6b;
      --border: #333;
      /* T38 — SPEC §12.5 / ARCH §7.2: name bridge + text on accent fills */
      --xyz-bg: var(--bg);
      --xyz-panel: var(--panel);
      --xyz-fg: var(--fg);
      --xyz-muted: var(--muted);
      --xyz-accent: var(--accent);
      --xyz-error: var(--error);
      --xyz-border: var(--border);
      --xyz-on-accent: #f0f4fc;
    }
    /* T38 — native form/scroll affordances follow theme (no uncued light chrome) */
    html {
      color-scheme: dark;
    }
    /* T36 — light palette + scrollbar contrast (SPEC §11 F02 / F17) */
    html[data-xyz-gallery-theme="light"] {
      color-scheme: light;
      --bg: #f0f1f4;
      --panel: #e4e6eb;
      --fg: #1a1b1f;
      --muted: #5c5f6a;
      --accent: #0b5cad;
      --error: #b42318;
      --border: #c5c8d1;
      --xyz-on-accent: #ffffff;
    }
    html[data-xyz-gallery-theme="light"] .vg-hint,
    html[data-xyz-gallery-theme="light"] .lvl-hint {
      background: rgba(255, 255, 255, 0.72);
      color: var(--fg);
    }
    .content::-webkit-scrollbar,
    .mv-folders-scroll::-webkit-scrollbar,
    .mv-filters-scroll::-webkit-scrollbar,
    .vg::-webkit-scrollbar,
    .lvl::-webkit-scrollbar,
    .dv-meta::-webkit-scrollbar,
    .dv-right::-webkit-scrollbar,
    .dv-tags-row::-webkit-scrollbar,
    .dv-tags--inline::-webkit-scrollbar,
    .gs-win-side::-webkit-scrollbar,
    .gs-win-main::-webkit-scrollbar,
    .mp-panel::-webkit-scrollbar,
    .mp-table-wrap::-webkit-scrollbar,
    .ft-ctx::-webkit-scrollbar,
    .ac-list--floating::-webkit-scrollbar,
    .mv-model-list--floating::-webkit-scrollbar,
    pre::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    .content::-webkit-scrollbar-track,
    .mv-folders-scroll::-webkit-scrollbar-track,
    .mv-filters-scroll::-webkit-scrollbar-track,
    .vg::-webkit-scrollbar-track,
    .lvl::-webkit-scrollbar-track,
    .dv-meta::-webkit-scrollbar-track,
    .dv-right::-webkit-scrollbar-track,
    .dv-tags-row::-webkit-scrollbar-track,
    .dv-tags--inline::-webkit-scrollbar-track,
    .gs-win-side::-webkit-scrollbar-track,
    .gs-win-main::-webkit-scrollbar-track,
    .mp-panel::-webkit-scrollbar-track,
    .mp-table-wrap::-webkit-scrollbar-track,
    .ft-ctx::-webkit-scrollbar-track,
    .ac-list--floating::-webkit-scrollbar-track,
    .mv-model-list--floating::-webkit-scrollbar-track,
    pre::-webkit-scrollbar-track {
      background: var(--panel);
    }
    .content::-webkit-scrollbar-thumb,
    .mv-folders-scroll::-webkit-scrollbar-thumb,
    .mv-filters-scroll::-webkit-scrollbar-thumb,
    .vg::-webkit-scrollbar-thumb,
    .lvl::-webkit-scrollbar-thumb,
    .dv-meta::-webkit-scrollbar-thumb,
    .dv-right::-webkit-scrollbar-thumb,
    .dv-tags-row::-webkit-scrollbar-thumb,
    .dv-tags--inline::-webkit-scrollbar-thumb,
    .gs-win-side::-webkit-scrollbar-thumb,
    .gs-win-main::-webkit-scrollbar-thumb,
    .mp-panel::-webkit-scrollbar-thumb,
    .mp-table-wrap::-webkit-scrollbar-thumb,
    .ft-ctx::-webkit-scrollbar-thumb,
    .ac-list--floating::-webkit-scrollbar-thumb,
    .mv-model-list--floating::-webkit-scrollbar-thumb,
    pre::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 6px;
      border: 2px solid var(--panel);
    }
    /* Firefox — same thumb/track tokens as Main / grid (T38, SPEC §12.5) */
    .content,
    .mv-folders-scroll,
    .mv-filters-scroll,
    .vg,
    .lvl,
    .dv-meta,
    .dv-right,
    .dv-tags-row,
    .dv-tags--inline,
    .gs-win-side,
    .gs-win-main,
    .mp-panel,
    .mp-table-wrap,
    .ft-ctx,
    .ac-list--floating,
    .mv-model-list--floating,
    pre {
      scrollbar-color: var(--border) var(--panel);
    }
    * { box-sizing: border-box; }
    #app input[type="checkbox"],
    #app input[type="radio"] {
      accent-color: var(--accent);
    }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, sans-serif;
      background: var(--bg); color: var(--fg);
    }
    /* T13 correction — pin #app to the viewport height so .content
       becomes a real scroll container (flex: 1 + min-height: 0). Before
       this, #app was min-height:100% → whenever any descendant grew
       taller than the viewport (e.g. T13's .vg-spacer at 30 000+ px),
       the **document itself** scrolled instead of .content, which in
       turn meant .vg never overflowed, its IntersectionObserver root
       was the whole content, and load-more never re-fired. */
    #app { display: flex; flex-direction: column; height: 100%; }
    .topbar {
      display: flex; align-items: center; gap: 14px;
      padding: 10px 20px; background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .topbar a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .topbar .muted { color: var(--muted); font-size: 13px; }
    .content { flex: 1 1 0; min-height: 0; overflow: auto; padding: 20px; }
    .muted { color: var(--muted); }
    .loading { color: var(--muted); }
    .error {
      color: var(--error);
      background: rgba(255, 107, 107, 0.08);
      padding: 10px 14px; border-radius: 6px;
      border: 1px solid rgba(255, 107, 107, 0.3);
    }
    dl dt { color: var(--muted); font-size: 12px;
            text-transform: uppercase; margin-top: 12px; letter-spacing: .5px; }
    dl dd { margin: 2px 0 0; font-size: 16px; }
    pre { background: var(--panel); padding: 14px; border-radius: 6px;
          overflow: auto; font-size: 12px; line-height: 1.45;
          max-height: 600px; }
    code { background: var(--panel); padding: 2px 6px; border-radius: 3px; }
    img.thumb-preview { max-width: 320px; border-radius: 6px;
                        margin: 12px 0; border: 1px solid var(--border); }

    /* T12 — MainView layout + filter panel + folder tree (columns set inline). */
    .mv {
      display: grid;
      align-items: stretch;
    }
    .mv-main {
      min-width: 0;
      margin-left: 8px;
    }
    .mv-splitter-v {
      width: 8px;
      cursor: col-resize;
      background: transparent;
      border-radius: 3px;
      justify-self: stretch;
      align-self: stretch;
    }
    .mv-splitter-v:hover {
      background: rgba(74, 158, 255, 0.12);
    }
    .mv-splitter-h {
      flex: 0 0 8px;
      cursor: row-resize;
      background: transparent;
      border-radius: 3px;
      margin: 2px 0;
    }
    .mv-splitter-h:hover {
      background: rgba(74, 158, 255, 0.12);
    }
    body.mv-dragging-col { cursor: col-resize !important; user-select: none; }
    body.mv-dragging-row { cursor: row-resize !important; user-select: none; }
    .mv-filters-pane { min-width: 0; }
    .mv-filters--stack {
      flex: 1 1 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    /* Column: body scrolls only real fields; slack absorbs splitter “extra” height
       so we do not scroll through empty pixels (T32+ layout fix). */
    .mv-filters-scroll {
      flex: 1 1 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .mv-filters-slack {
      flex: 1 1 0;
      min-height: 0;
    }
    /* Definite height so flex children (.mv-folders) get non-zero space; otherwise
       flex:1 + min-height:0 can collapse the folder tree to 0px tall. */
    .mv-sidebar {
      display: flex; flex-direction: column;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 6px; padding: 12px; position: sticky; top: 0;
      height: calc(100vh - 80px);
      max-height: calc(100vh - 80px);
      min-height: 0;
      overflow: hidden;
    }
    .mv-sec-head { display: flex; align-items: center; justify-content: space-between;
                   gap: 8px; margin-bottom: 6px; }
    .mv-collapse { background: transparent; color: var(--fg); border: 0;
                   cursor: pointer; font-weight: 600; font-size: 13px;
                   padding: 4px 0; }
    .mv-chevron { display: inline-block; width: 14px; color: var(--muted); }
    .mv-reset { background: var(--bg); color: var(--fg); border: 1px solid var(--border);
                border-radius: 4px; padding: 3px 8px; font-size: 12px; cursor: pointer; }
    .mv-reset:disabled { opacity: 0.4; cursor: default; }
    .mv-filters-body {
      flex: 0 1 auto;
      max-height: 100%;
      min-height: 0;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: flex; flex-direction: column; gap: 8px;
      padding-bottom: 10px;
    }
    .mv-field { display: flex; flex-direction: column; gap: 3px; font-size: 12px;
                color: var(--muted); }
    .mv-field > span { letter-spacing: .3px; }
    .mv-field input[type=text], .mv-field .ac-input, .mv-field select, .mv-field input[type=date] {
      background: var(--bg); color: var(--fg); border: 1px solid var(--border);
      border-radius: 4px; padding: 5px 7px; font-size: 13px; width: 100%;
      box-sizing: border-box;
    }
    /* Autocomplete: list is teleported to body + position:fixed (see Autocomplete.js). */
    .ac-wrap { width: 100%; }
    .ac-list--floating {
      margin: 0; padding: 0; list-style: none; overflow-y: auto;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    }
    .ac-item {
      padding: 7px 10px; cursor: pointer; font-size: 13px; color: var(--fg);
      border-left: 3px solid transparent;
      transition: background 0.08s ease, border-color 0.08s ease;
    }
    .ac-item:hover:not(.ac-muted) {
      background: rgba(74, 158, 255, 0.08);
    }
    .ac-item.ac-active {
      background: rgba(74, 158, 255, 0.22);
      border-left-color: var(--accent, #4a9eff);
      outline: none;
    }
    .ac-muted { color: var(--muted); cursor: default; }
    .ac-line { display: flex; flex-wrap: nowrap; align-items: baseline; gap: 0; min-width: 0; }
    .ac-name {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      font-weight: 500; flex: 1 1 auto; min-width: 0;
    }
    .ac-usage {
      flex-shrink: 0; margin-left: 0.35em;
      font-size: 11px; font-weight: 400; line-height: 1.2;
      color: var(--muted); opacity: 0.92; font-variant-numeric: tabular-nums;
    }
    /* T21 — model filter: custom list so name vs usage can diverge visually. */
    .mv-model-pick { width: 100%; }
    .mv-model-trigger {
      display: flex; align-items: center; width: 100%;
      text-align: left; cursor: pointer;
      background: var(--bg); color: var(--fg); border: 1px solid var(--border);
      border-radius: 4px; padding: 5px 7px; font-size: 13px;
      box-sizing: border-box;
    }
    .mv-model-trigger:disabled { opacity: 0.45; cursor: default; }
    .mv-model-trigger-all { font-style: italic; color: var(--muted); }
    .mv-model-trigger-line {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 0.75rem; width: 100%; min-width: 0;
    }
    .mv-model-trigger-unknown .mv-model-name { color: var(--fg); }
    .mv-model-trigger .mv-model-name {
      flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; font-weight: 600; font-size: 14px;
    }
    .mv-model-trigger .mv-model-usage {
      flex-shrink: 0; margin-left: 0.5rem;
      font-size: 11px; font-weight: 400; line-height: 1.2;
      color: var(--muted); opacity: 0.88; font-variant-numeric: tabular-nums;
    }
    .mv-model-list--floating {
      margin: 0; padding: 0; list-style: none; overflow-y: auto;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    }
    .mv-model-item {
      padding: 8px 10px; cursor: pointer; font-size: 13px; color: var(--fg);
      border-left: 3px solid transparent;
    }
    .mv-model-item:hover:not(.mv-model-item--active) {
      background: rgba(74, 158, 255, 0.08);
    }
    .mv-model-item--active {
      background: rgba(74, 158, 255, 0.22);
      border-left-color: var(--accent, #4a9eff);
    }
    .mv-model-row {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 0.85rem; width: 100%; min-width: 0;
    }
    .mv-model-item .mv-model-name {
      flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; font-weight: 600; font-size: 14px;
    }
    .mv-model-item .mv-model-name--all {
      font-style: italic; font-weight: 500; font-size: 13px; color: var(--muted);
    }
    .mv-model-item .mv-model-usage {
      flex-shrink: 0; margin-left: 0.5rem;
      font-size: 11px; font-weight: 400; color: var(--muted);
      opacity: 0.9; font-variant-numeric: tabular-nums;
    }
    .mv-date { border: 1px solid var(--border); border-radius: 4px; padding: 6px 8px; }
    .mv-date legend { color: var(--muted); font-size: 12px; padding: 0 4px; }
    .mv-date-row { display: flex; align-items: center; gap: 6px;
                   font-size: 12px; color: var(--fg); margin: 2px 0; }
    .mv-date-row input[type=date] { flex: 1; }

    .mv-folders {
      flex: 1 1 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-top: 1px solid var(--border);
      padding-top: 10px;
      margin-top: 4px;
    }
    .mv-folders-title-row {
      display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between;
      gap: 6px 10px; flex-shrink: 0; margin: 0 0 8px; min-width: 0;
    }
    .mv-folders-title-row h3 {
      margin: 0; flex: 1 1 auto; min-width: 0;
      font-size: 13px; text-transform: uppercase;
      letter-spacing: .5px; color: var(--muted); font-weight: 600;
    }
    .mv-folders-title-row .ft-recursive { flex: 0 0 auto; }
    .mv-folders-scroll {
      flex: 1 1 0;
      min-height: 120px;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .ft-toolbar { margin-bottom: 6px; }
    .ft-recursive { background: var(--bg); color: var(--fg);
                    border: 1px solid var(--border); border-radius: 4px;
                    padding: 3px 8px; font-size: 12px; cursor: pointer; }
    .ft-recursive[aria-pressed="true"] { background: var(--accent); color: var(--xyz-on-accent);
                                         border-color: var(--accent); }
    .ft-list { list-style: none; margin: 0; padding: 0; }
    .ft-list > li { width: 100%; box-sizing: border-box; }
    .ft-list > li > .ft-row-inner { width: 100%; }
    .ft-row { margin: 0; }
    /* T39 — 与 Main 侧 .ac-item / .mv-model-item 同一套强调曲线（T40 图标 24×1.5 契约对齐 ft-svg） */
    .ft-node { display: flex; align-items: center; flex: 1; min-width: 0; gap: 6px; padding: 5px 8px;
               color: var(--fg); text-decoration: none; font-size: 13px; border-radius: 3px;
               border-left: 3px solid transparent; box-sizing: border-box;
               flex-wrap: nowrap; }
    .ft-node:hover { background: rgba(74, 158, 255, 0.08); }
    .ft-node.active {
      background: rgba(74, 158, 255, 0.22);
      color: var(--fg);
      border-left-color: var(--accent, #4a9eff);
      outline: none;
    }
    .ft-ico { display: flex; flex: 0 0 auto; align-items: center; color: var(--muted); }
    .ft-node:hover .ft-ico { color: var(--fg); }
    .ft-node.active .ft-ico { color: var(--accent, #4a9eff); }
    .ft-svg { display: block; }
    .ft-label-wrap { flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis;
                     white-space: nowrap; }
    .ft-count { font-size: 11px; margin-left: 4px; }
    .ft-node.active .ft-count { color: var(--muted); opacity: 0.9; }
    .ft-all .ft-label-wrap { font-style: italic; }
    .ft-row-inner { display: flex; align-items: stretch; gap: 2px; min-width: 0; width: 100%; }
    .ft-guide {
      width: 12px; flex: 0 0 12px; min-height: 1.25em; position: relative;
      box-sizing: border-box; align-self: stretch; pointer-events: none;
    }
    .ft-guide::before {
      content: "";
      position: absolute; left: 4px; top: 0; bottom: 0;
      width: 0; border-left: 1px solid var(--border); opacity: 0.5;
    }
    .ft-chev {
      flex: 0 0 auto; width: 24px; height: 24px; padding: 0;
      display: inline-flex; align-items: center; justify-content: center;
      border: none; background: transparent; color: var(--muted);
      cursor: pointer; border-radius: 3px; flex-shrink: 0;
    }
    .ft-chev:hover { background: rgba(74, 158, 255, 0.12); color: var(--fg); }
    .ft-chev-spacer { display: flex; width: 24px; min-width: 24px; flex: 0 0 24px; }
    .ft-ctx { background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
              box-shadow: 0 4px 16px rgba(0,0,0,0.35); min-width: 160px; padding: 4px 0;
              max-height: min(72vh, calc(100vh - 16px));
              overflow-x: hidden; overflow-y: auto; }
    .ft-ctx-item { display: block; width: 100%; text-align: left; padding: 6px 12px;
                   font-size: 13px; border: none; background: transparent; color: var(--fg);
                   cursor: pointer; }
    .ft-ctx-item:hover { background: rgba(74, 158, 255, 0.12); }
    .ft-mp-overlay { z-index: 10050; }
    .ft-toast {
      position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
      z-index: 10060; padding: 8px 14px; border-radius: 6px; font-size: 13px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.35);
      border: 1px solid var(--border); background: var(--panel); color: var(--fg);
      max-width: min(480px, 94vw); pointer-events: none;
    }
    .ft-toast--err { border-color: #a44; color: #fcc; }

    .mv-main-head { display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px;
                    padding: 6px 0 12px; border-bottom: 1px solid var(--border);
                    margin-bottom: 12px; font-size: 13px; }
    .mv-main-head .mv-count strong { font-size: 16px; }
    .mv-sep { opacity: 0.6; }
    .mv-preview { list-style: none; margin: 0; padding: 0;
                  display: flex; flex-direction: column; gap: 4px; }
    .mv-preview li { font-size: 13px; padding: 4px 6px; border-radius: 3px; }
    .mv-preview li:hover { background: rgba(255,255,255,0.03); }
    .mv-preview a { color: var(--fg); text-decoration: none; }
    .mv-preview a:hover { color: var(--accent); text-decoration: underline; }
    .mv-note { font-size: 12px; margin-top: 14px; }

    /* T13 — toolbar (cards-per-row slider + sort dropdown),
       VirtualGrid, ThumbCard, context menu. */
    .mv-toolbar { display: flex; flex-wrap: wrap; gap: 18px;
                  align-items: center; margin-bottom: 10px;
                  padding: 6px 0; }
    .mv-toolbar label { display: flex; align-items: center; gap: 8px;
                        font-size: 12px; }
    .mv-field--with-clear { gap: 5px; }
    .mv-field-labelrow {
      display: flex; flex-direction: row; align-items: center;
      gap: 8px; min-width: 0;
    }
    .mv-field-inputrow {
      display: flex; flex-direction: row; align-items: center;
      gap: 6px; min-width: 0;
    }
    .mv-field-inputrow > input[type=text] {
      flex: 1 1 auto;
      min-width: 0;
      width: auto;
    }
    .mv-field-inputrow--ac .ac-wrap {
      flex: 1 1 auto;
      min-width: 0;
      width: auto;
    }
    .mv-field-title { color: var(--muted); letter-spacing: .3px; }
    .mv-field-clear {
      flex: 0 0 auto;
      width: 22px; height: 22px; padding: 0; margin: 0;
      display: inline-flex; align-items: center; justify-content: center;
      border: none; border-radius: 4px;
      background: transparent; color: var(--error);
      font-size: 18px; line-height: 1; cursor: pointer;
    }
    .mv-field-clear-x { position: relative; top: -1px; font-weight: 600; }
    .mv-field-clear:hover { background: rgba(180, 35, 24, 0.14); color: #e85545; }
    .mv-field-clear:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
    .mv-cpr input[type=range] { width: 160px; accent-color: var(--accent); }
    .mv-cpr-val { color: var(--fg); font-variant-numeric: tabular-nums;
                  min-width: 2ch; text-align: right; }
    .mv-sort-group {
      display: inline-flex; flex-direction: row; align-items: center;
      gap: 4px; flex-wrap: nowrap;
    }
    .mv-sort-group .mv-sort { margin: 0; gap: 6px; }
    .mv-sort select, .mv-sort-key { background: var(--bg); color: var(--fg);
                      border: 1px solid var(--border); border-radius: 4px;
                      padding: 4px 6px; font-size: 13px; }
    .mv-sort-dir {
      background: var(--bg); color: var(--fg);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 2px 8px; font-size: 15px; line-height: 1.1; cursor: pointer;
      min-width: 30px;
    }
    .mv-sort-dir:hover { border-color: var(--accent); color: var(--accent); }
    .mv-bulk { display: flex; align-items: center; gap: 6px; font-size: 12px;
               cursor: pointer; user-select: none; }
    .mv-bulk input { cursor: pointer; }
    /* T45 — compact / line view toggle */
